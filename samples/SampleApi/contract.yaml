openapi: 3.1.0
info:
  title: SampleApi
  version: 1.0.0
  description: |
    Comprehensive OpenAPI 3.1 contract used by the Wave 5 end-to-end validation suite.
    It exercises path/method/parameter matching, strict object schemas (additionalProperties
    false), readOnly/writeOnly enforcement, recursive $ref (User.manager -> User), no-body
    statuses (204/304), required response headers, structured-suffix wildcards
    (application/*+json) and binary streaming responses.
paths:
  /users/{id}:
    get:
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: The user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: The user was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      operationId: getCurrentUser
      responses:
        '200':
          description: The current user (literal path must beat /users/{id}).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users:
    get:
      operationId: listUsers
      parameters:
        - name: status
          in: query
          required: false
          style: form
          schema:
            type: string
            enum: [active, inactive]
        - name: ids
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - name: tags
          in: query
          required: false
          style: spaceDelimited
          schema:
            type: array
            items:
              type: string
        - name: codes
          in: query
          required: false
          style: pipeDelimited
          schema:
            type: array
            items:
              type: string
        - name: filter
          in: query
          required: false
          style: deepObject
          schema:
            type: object
            properties:
              region:
                type: string
        - name: X-Trace
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The matching users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        default:
          description: An unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: The created user.
          headers:
            Location:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /files/{name}:
    get:
      operationId: getFile
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The file bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /no-content:
    delete:
      operationId: deleteNoContent
      responses:
        '204':
          description: Deleted; no content.
  /etag:
    get:
      operationId: getEtag
      responses:
        '304':
          description: Not modified; no content.
        '200':
          description: The current representation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /widget:
    get:
      operationId: getWidget
      responses:
        '200':
          description: A widget (structured-suffix +json wildcard content type).
          content:
            application/*+json:
              schema:
                $ref: '#/components/schemas/Widget'
components:
  schemas:
    User:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
        manager:
          $ref: '#/components/schemas/User'
        tags:
          type: array
          items:
            type: string
    UserCreate:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: integer
    Widget:
      type: object
      required: [sku]
      properties:
        sku:
          type: string
        price:
          type: number
